name: Poll Telegram

# Polling FREQUENTE e indipendente dalla routine giornaliera.
# Gira ogni 15 minuti: così una risposta data alle 19:00 finisce nell'inbox
# entro le ~19:15, MOLTO prima che la routine del mattino dopo (8:40) la cerchi.
# Questo elimina alla radice il disallineamento tra "quando rispondi" e
# "quando la risposta è disponibile nell'inbox".
#
# NB: il cron di GitHub Actions NON è puntuale al minuto (può ritardare di
# qualche minuto, specie su repo a bassa attività). Con intervallo di 15 min
# il margine resta comunque ampio: anche un ritardo di 10-15 min è innocuo.
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:  # trigger manuale per debug

jobs:
  poll:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: telegram-poll
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Poll Telegram updates
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python3 .github/scripts/poll.py

      - name: Commit updates
        run: |
          git config user.name  "radiolearn-bot"
          git config user.email "radiolearn-bot@users.noreply.github.com"
          if [ -z "$(git status --porcelain)" ]; then
            echo "No new updates to commit."
            exit 0
          fi
          git add -A
          git commit -m "📥 Telegram poll ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          # Rebase-safe push: the daily routine and the send workflow push to main
          # concurrently. A plain `git push` that loses the race fails the run and
          # would drop the just-captured inbox answers + the advanced last_update_id.
          # Retry with rebase so quiz answers are never lost to a concurrent push.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — rebasing onto origin/main and retrying."
            git pull --rebase origin main || { git rebase --abort 2>/dev/null; exit 1; }
            sleep $((attempt * 2))
          done
          echo "::error::Failed to push poll commit after 5 attempts."
          exit 1
